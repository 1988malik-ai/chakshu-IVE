# Build Windows installer on real Windows (no Mac/VM required).
# Download artifact from Actions tab after push or manual run.

name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'desktop/**'
      - 'scripts/**'
      - 'requirements*.txt'
      - 'pyproject.toml'

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements-fast.txt
          pip install -r requirements-video.txt
          pip install -e . --no-deps
          pip install pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: PyInstaller backend
        run: pyinstaller --noconfirm scripts/aive-api.spec

      - name: Stage backend bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-backend | Out-Null
          Copy-Item dist/aive-api.exe dist-backend/
          Copy-Item -Recurse frontend/dist dist-backend/frontend-dist

      - name: Portable zip (extract and run)
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build_portable.ps1 -SkipBuild

      - name: Electron native app + installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm install
          npm run build

      - name: Stage native portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item desktop/dist/Chakshu-Native-*.exe release/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Chakshu-Windows-Setup
          path: desktop/dist/Chakshu-Setup-*.exe
          if-no-files-found: error

      - name: Upload portable zip (browser)
        uses: actions/upload-artifact@v4
        with:
          name: Chakshu-Portable
          path: release/Chakshu-Portable.zip
          if-no-files-found: error

      - name: Upload native app (recommended)
        uses: actions/upload-artifact@v4
        with:
          name: Chakshu-Native
          path: release/Chakshu-Native-*.exe
          if-no-files-found: error
