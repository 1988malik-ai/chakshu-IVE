# Build Windows installer on real Windows (no Mac/VM required).
# Download artifact from Actions tab after push or manual run.

name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'desktop/**'
      - 'scripts/**'
      - 'requirements*.txt'
      - 'pyproject.toml'

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install --prefer-binary -r requirements-fast.txt
          pip install -r requirements-video.txt
          pip install -e . --no-deps
          pip install pyinstaller

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_ENV: development
        run: |
          npm ci
          npm run build

      - name: PyInstaller backend
        run: pyinstaller --noconfirm scripts/aive-api.spec

      - name: Stage backend bundle
        shell: pwsh
        run: |
          if (-not (Test-Path frontend/dist/index.html)) { throw "frontend/dist/index.html missing" }
          New-Item -ItemType Directory -Force -Path dist-backend | Out-Null
          Copy-Item dist/aive-api.exe dist-backend/
          Copy-Item -Recurse frontend/dist dist-backend/frontend-dist
          if (-not (Test-Path dist-backend/frontend-dist/index.html)) { throw "dist-backend UI copy failed" }

      - name: Verify UI inside aive-api.exe
        run: python scripts/verify_bundled_ui.py dist/aive-api.exe

      - name: Portable zip (extract and run)
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build_portable.ps1 -SkipBuild

      - name: Generate Windows app icon
        run: python scripts/generate_desktop_icon.py

      - name: Electron native app + installer
        working-directory: desktop
        env:
          NODE_ENV: development
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npm install
          npm run build

      - name: Stage native portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item desktop/dist/Chakshu-Native-*.exe release/

      - name: Stage release artifacts for publishing
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/s3 | Out-Null
          Copy-Item desktop/dist/Chakshu-Setup-*.exe release/s3/
          Copy-Item release/Chakshu-Native-*.exe release/s3/
          Copy-Item release/Chakshu-Portable.zip release/s3/
          $manifest = [ordered]@{
            product = "Chakshu Forensics"
            version = "1.0.0"
            ref = "${{ github.ref_name }}"
            sha = "${{ github.sha }}"
            run_id = "${{ github.run_id }}"
            created_utc = (Get-Date).ToUniversalTime().ToString("o")
            artifacts = @(Get-ChildItem release/s3 | ForEach-Object {
              [ordered]@{
                name = $_.Name
                size_bytes = $_.Length
                sha256 = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              }
            })
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content release/s3/manifest.json -Encoding UTF8

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Chakshu-Windows-Setup
          path: desktop/dist/Chakshu-Setup-*.exe
          if-no-files-found: error

      - name: Upload portable zip (browser)
        uses: actions/upload-artifact@v4
        with:
          name: Chakshu-Portable
          path: release/Chakshu-Portable.zip
          if-no-files-found: error

      - name: Upload native app (recommended)
        uses: actions/upload-artifact@v4
        with:
          name: Chakshu-Native
          path: release/Chakshu-Native-*.exe
          if-no-files-found: error

      - name: Configure AWS credentials for S3 publish
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Publish artifacts to S3 chakshu folder
        if: github.event_name == 'push'
        shell: pwsh
        env:
          CHAKSHU_S3_BUCKET: ${{ secrets.CHAKSHU_S3_BUCKET }}
        run: |
          if (-not $env:CHAKSHU_S3_BUCKET) { throw "Missing CHAKSHU_S3_BUCKET secret" }
          $branch = "${{ github.ref_name }}" -replace '[^A-Za-z0-9._-]', '-'
          $sha = "${{ github.sha }}"
          $versioned = "s3://$env:CHAKSHU_S3_BUCKET/chakshu/$branch/$sha/"
          $latest = "s3://$env:CHAKSHU_S3_BUCKET/chakshu/latest/"
          aws s3 sync release/s3 $versioned --delete
          aws s3 sync release/s3 $latest --delete
          "Published artifacts to $versioned and $latest"
